services:
  - type: web
    name: ad-analyzer
    runtime: python311
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:8000 wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE
        value: admin.db
    staticPublicPath: static
